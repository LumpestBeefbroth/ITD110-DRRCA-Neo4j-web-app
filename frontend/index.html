<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRRCA Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/dashboard.css" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <main id="appShell" class="mx-auto hidden min-h-screen max-w-7xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
      <header class="app-header">
        <div>
          <p class="eyebrow">Disaster Risk Reduction and Climate Adaptation</p>
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="header-actions">
          <span id="userBadge" class="user-badge"></span>
          <a class="nav-link active" href="./index.html">Dashboard</a>
          <a class="nav-link" href="./manage.html">Manage</a>
          <a class="nav-link" href="./insights.html">Insights</a>
          <a class="nav-link" href="./backup.html" data-admin-only>Backup</a>
          <button id="darkModeBtn" class="btn btn-light text-lg" aria-label="Toggle dark mode">☾</button>
          <button id="logoutBtn" class="btn btn-light">Logout</button>
        </div>
      </header>

      <section class="grid gap-4 md:grid-cols-3 xl:grid-cols-6" id="summaryCards"></section>

      <section class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
        <div class="panel">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="section-title">Evacuation Capacity</h2>
            <span id="healthBadge" class="status-pill">Checking</span>
          </div>
          <div class="h-80">
            <canvas id="capacityChart"></canvas>
          </div>
        </div>

        <div class="panel">
          <h2 class="section-title">Emergency Priority Scores</h2>
          <div id="priorityList" class="mt-4 space-y-2"></div>
        </div>
      </section>

      <section class="panel">
        <div class="mb-4">
          <h2 class="section-title">Response Map</h2>
          <p class="muted">Highest-priority communities with linked hazard areas and evacuation centers.</p>
        </div>
        <div id="responseMap" class="grid gap-3 md:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </main>

    <script src="./javascript/common.js"></script>
    <script src="./javascript/dashboard.js"></script>
  </body>
</html>
